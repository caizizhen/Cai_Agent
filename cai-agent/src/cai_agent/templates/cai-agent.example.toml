# active = "local-lmstudio"
# subagent = "local-lmstudio"
# planner = "anthropic-sonnet"
#
# 细粒度路由 [[models.route]]（H1-MP-03 / Canvas F1）：按首条 user 目标子串 + 上一轮 prompt_tokens 阈值切换 profile（先于 [models.routing] 评估）。
# [[models.route]]
# match_task_kind = "complex_refactor"
# use_profile = "gpt-5"
# [[models.route]]
# match_tokens_gt = 50000
# use_profile = "kimi-long-ctx"
#
# 声明式路由（可选）：按首条 user 目标文本 + role + 可选「剩余 token」条件命中 profile；见 docs/MODEL_ROUTING_RULES.zh-CN.md
