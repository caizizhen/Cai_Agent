# 由 `cai-agent init`（默认）或 `cai-agent init --preset starter` 复制到当前目录的 cai-agent.toml（勿提交含真实 Key 的文件）
#
# 优先级：环境变量 > 本文件 > 内置默认
# 也可通过环境变量 CAI_CONFIG 或命令行 --config 指定其他路径

[llm]
provider = "openai_compatible" # openai_compatible | copilot
base_url = "http://localhost:1234/v1"
model = "google/gemma-4-31b"
api_key = "lm-studio"
# 为 true 时读取系统代理；对 localhost/127.* 的 LLM/MCP/ping 会自动不走代理，避免本地 LM Studio 被代理成 HTTP 503。
http_trust_env = false
# 采样温度（0~2，视模型支持而定）
temperature = 0.2
# 单次 Chat Completions HTTP 超时（秒）
timeout_sec = 120
# 单次 chat_completion 的 HTTP 尝试总次数（含首次；断线/429/502/503/504/截断 JSON 等会重试）。可用环境变量 CAI_LLM_MAX_RETRIES 覆盖（1~100）。
max_http_retries = 50
# 上下文窗口（tokens），仅用于 TUI 进度条的分母，不发送给服务端。
# 常见值：LM Studio/Qwen/Gemma 本地 32768；gpt-4o 128000；claude-sonnet 200000。
# 可用 CAI_CONTEXT_WINDOW 环境变量覆盖；[[models.profile]].context_window 优先级更高。
# context_window = 32768

# Copilot 集成（重要）
# 说明：Copilot 官方不提供稳定公开的 chat/completions 接口。
# 建议通过“OpenAI 兼容代理”接入（例如本地代理服务），然后把 llm.provider 设为 "copilot"。
# provider=copilot 时，优先读取 COPILOT_* 环境变量，其次读取本节配置，再回退 llm.*
[copilot]
# base_url = "http://localhost:4141/v1"
# model = "gpt-4o-mini"
# api_key = "ghu_or_proxy_token"

# 最小 MCP Bridge（可选）
# 协议约定：
# - GET  {base_url}/tools              -> {"tools":[{"name":"...","description":"..."}]} 或 string[]
# - POST {base_url}/tools/{name} body  -> {"args":{...}}
# 返回 JSON 或文本，均会作为工具结果回传给模型。
[mcp]
# base_url = "http://localhost:8787"
# api_key = "optional-token"
timeout_sec = 20

[agent]
# workspace = "D:/gitrepo/myproject"
max_iterations = 16
command_timeout_sec = 120
mock = false
# 是否启用 MCP Bridge 工具（mcp_list_tools / mcp_call_tool）
mcp_enabled = false
# 是否在系统提示中附加工作区根目录的 CAI.md / AGENTS.md / CLAUDE.md
project_context = true
# 是否附加 git 分支与简短 status（只读）
git_context = true

# 任务完成后自动提炼 skills/_evolution_*.md（另可用环境变量 CAI_SKILLS_AUTO_EXTRACT=1 开启）
[skills.auto_extract]
# enabled = false
# mode = "template" # template | llm | auto
# min_goal_chars = 8

[skills.auto_improve]
# min_usage_count = 1
# min_days_since_last_improve = 0

# 记忆治理：doctor / release-ga --with-memory-policy 会透出；recall 零命中时是否写入负样本审计行。
[memory.policy]
# max_entries_per_day = 10000
# default_ttl_days = 90
# recall_negative_audit = true

# 对话轮次较长时注入一次「建议收尾」提示（0 表示关闭）；见 docs/CONTEXT_AND_COMPACT.zh-CN.md
[context]
# compact_after_iterations = 10
# compact_min_messages = 8
# 工具返回「工具执行失败」后，下一轮 LLM 前注入一次收束提示（默认 true）
# compact_on_tool_error = true
# 每累计 N 次「成功」工具轮次注入里程碑提示；0 关闭
# compact_after_tool_calls = 0
# 真实压缩模式：off | heuristic | llm；llm 失败时自动降级 heuristic
# compact_mode = "heuristic"
# 真实上下文压缩：估算 prompt tokens 达到 context_window 的该比例时触发；0 关闭
# compact_trigger_ratio = 0.85
# 压缩时保留最近 N 条原始消息，旧消息折叠为 context_summary_v1
# compact_keep_tail_messages = 8
# compact_summary_max_chars = 6000

# 默认不强制 compile/test；在 CI 或提交前可把 compile / test 改为 true。
[quality_gate]
compile = false
test = false
lint = false
typecheck = false
security_scan = false
# test_policy: skip | fail_if_missing（CI 无 pytest 时是否失败）
test_policy = "skip"
lint_policy = "skip"
# typecheck_policy: skip | fail_if_missing（未安装 mypy 时）
typecheck_policy = "skip"
# typecheck_paths = ["cai-agent/src"]

# 追加任意门禁命令（在工作区根目录执行）
# [[quality_gate.extra]]
# argv = ["python", "-c", "print('gate-extra-ok')"]

[security_scan]
exclude_globs = [
  "cai-agent/src/cai_agent/security_scan.py",
  "commands/security-scan.md",
  "skills/security-scan-light.md",
  "docs/**",
]
# 按规则名覆盖启用/禁用，例如：aws_access_key = false
# [security_scan.rule_overrides]
# openai_like_key = false

# 默认开启且无主机白名单（unrestricted），便于查文档/天气 API 等；收紧时设 unrestricted=false 并配置 allow_hosts。
# 环境变量：CAI_FETCH_URL_ENABLED、CAI_FETCH_URL_UNRESTRICTED、CAI_FETCH_URL_ALLOW_HOSTS（逗号分隔）、CAI_FETCH_URL_MAX_BYTES、CAI_FETCH_URL_TIMEOUT_SEC、CAI_FETCH_URL_MAX_REDIRECTS、CAI_FETCH_URL_ALLOW_PRIVATE_RESOLVED_IPS
[fetch_url]
enabled = true
unrestricted = true
# unrestricted = false
# allow_hosts = ["github.com", "*.example.com"]
# max_bytes = 500000
# timeout_sec = 30
# max_redirects = 20   # GET 跟随重定向上限（1–50，默认 20，与 httpx 默认一致）
# allow_private_resolved_ips = false   # true 时跳过「解析后私网地址拒绝」（仅在内网 DNS 故意解析到 RFC1918 等时需要）

[permissions]
# write_file 与 make_dir 共用同一策略；run_command、fetch_url 各自一行
# write_file / run_command / fetch_url: allow | ask | deny（默认均为 allow；需要审批再改为 ask）
write_file = "allow"
run_command = "allow"
fetch_url = "allow"

# 解限模式（默认 false）：后续用于「任务少限制、危险行为二次确认」；CAI_UNRESTRICTED_MODE=1 可覆盖 TOML。
[safety]
unrestricted_mode = false
# 解限模式下危险行为是否仍需要二次确认（默认 true）
dangerous_confirmation_required = true
# 为 true 时写入 .cai/dangerous-approve.jsonl（授予/执行/会话放行等）；CAI_DANGEROUS_AUDIT_LOG=1 可覆盖
dangerous_audit_log_enabled = false
# P4：追加视作「关键配置文件」的 basename（与内置清单合并，解限且要求确认时对 write_file 二次确认）
# dangerous_write_file_critical_basenames = ["custom.toml"]
# 磁盘已有该文件且规范化 UTF-8 正文与写入相同时，跳过上述 basename 级二次确认（默认 true；CAI_DANGEROUS_CRITICAL_WRITE_SKIP_IF_UNCHANGED 可覆盖）
# dangerous_critical_write_skip_if_unchanged = true
# P4：run_command argv[0] 额外强制二次确认的基名（须仍在允许列表内）
# run_command_extra_danger_basenames = ["git"]

[cost]
# cost budget --check 默认上限（可用 CLI --max-tokens 覆盖）
budget_max_tokens = 50000

# [hooks]
# profile = "standard"   # minimal | standard | strict（控制 hooks.json 中带 command 的外部钩子）
# disabled = ["some-hook-id"]
# timeout_sec = 120

# ===========================================================================
# 模型 Profile（开发中，详见 docs/MODEL_SWITCHER_BACKLOG.zh-CN.md）
# 说明：启用 [[models.profile]] 后，上方 [llm] 段将被视为兼容回退；推荐把密钥
# 写到环境变量，在 profile 里只写 api_key_env = "VAR_NAME"。
# ---------------------------------------------------------------------------
