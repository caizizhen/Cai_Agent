# ===========================================================================
# 运行后端（H1-RT）：`cai-agent runtime list` / `runtime test --backend local`
# ===========================================================================
# [runtime]
# backend = "local"   # local | docker | ssh | modal | daytona | singularity
# # 覆盖 TOML：CAI_RUNTIME_BACKEND=docker
#
# [runtime.docker]
# container_name = "my-dev-container"
# # 追加到 `docker exec` 的 OCI 选项（示例：非 root、只读根）
# exec_options = ["--user", "1000:1000"]
# cpus = "1.5"
# memory = "1g"
#
# [runtime.ssh]
# host = "10.0.0.5"
# user = "ubuntu"
# key_path = "C:\\Users\\me\\.ssh\\id_rsa"
# strict_host_key_checking = true
# known_hosts_path = "C:\\Users\\me\\.ssh\\known_hosts"
# connect_timeout_sec = 15
#
# [runtime.modal]
# app_name = "my-modal-app"
# hibernate_idle_seconds = 300
#
# [runtime.daytona]
# workspace = "ws-id-placeholder"
#
# [runtime.singularity]
# sif_path = "/path/to/image.sif"
# bind_paths = ["/data:/data"]
