name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install cai-agent (editable + dev)
        run: |
          python -m pip install -U pip
          python -m pip install -e "./cai-agent[dev]"

      - name: Pytest
        run: python -m pytest -q cai-agent/tests

      - name: TOOLS_REGISTRY.zh-CN.md up-to-date
        run: python scripts/gen_tools_registry_zh.py --check

      - name: CLI regression script
        run: python scripts/run_regression.py

      - name: Upload QA regression Markdown log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-regression-logs-py${{ matrix.python-version }}
          path: docs/qa/runs/regression-*.md
          if-no-files-found: ignore
