# 由 `cai-agent init` 复制到当前目录的 cai-agent.toml（勿提交含真实 Key 的文件）
#
# 优先级：环境变量 > 本文件 > 内置默认
# 也可通过环境变量 CAI_CONFIG 或命令行 --config 指定其他路径

[llm]
provider = "openai_compatible" # openai_compatible | copilot
base_url = "http://localhost:1234/v1"
model = "qwen/qwen3.6-35b-a3b"
api_key = "lm-studio"
http_trust_env = false
# 采样温度（0~2，视模型支持而定）
temperature = 0.2
# 单次 Chat Completions HTTP 超时（秒）
timeout_sec = 120

# Copilot 集成（重要）
# 说明：Copilot 官方不提供稳定公开的 chat/completions 接口。
# 建议通过“OpenAI 兼容代理”接入（例如本地代理服务），然后把 llm.provider 设为 "copilot"。
# provider=copilot 时，优先读取 COPILOT_* 环境变量，其次读取本节配置，再回退 llm.*
[copilot]
# base_url = "http://localhost:4141/v1"
# model = "gpt-4o-mini"
# api_key = "ghu_or_proxy_token"

# 最小 MCP Bridge（可选）
# 协议约定：
# - GET  {base_url}/tools              -> {"tools":[{"name":"...","description":"..."}]} 或 string[]
# - POST {base_url}/tools/{name} body  -> {"args":{...}}
# 返回 JSON 或文本，均会作为工具结果回传给模型。
[mcp]
# base_url = "http://localhost:8787"
# api_key = "optional-token"
timeout_sec = 20

[agent]
# workspace = "D:/gitrepo/myproject"
max_iterations = 16
command_timeout_sec = 120
mock = false
# 是否启用 MCP Bridge 工具（mcp_list_tools / mcp_call_tool）
mcp_enabled = false
# 是否在系统提示中附加工作区根目录的 CAI.md / AGENTS.md / CLAUDE.md
project_context = true
# 是否附加 git 分支与简短 status（只读）
git_context = true

# 对话轮次较长时注入一次「建议收尾」提示（0 表示关闭）；见 docs/CONTEXT_AND_COMPACT.zh-CN.md
[context]
# compact_after_iterations = 10
# compact_min_messages = 8

[quality_gate]
compile = true
test = true
lint = false
typecheck = false
security_scan = false
# test_policy: skip | fail_if_missing（CI 无 pytest 时是否失败）
test_policy = "skip"
lint_policy = "skip"
# typecheck_policy: skip | fail_if_missing（未安装 mypy 时）
typecheck_policy = "skip"
# typecheck_paths = ["cai-agent/src"]

# 追加任意门禁命令（在工作区根目录执行）
# [[quality_gate.extra]]
# argv = ["python", "-c", "print('gate-extra-ok')"]

[security_scan]
exclude_globs = [
  "cai-agent/src/cai_agent/security_scan.py",
  "commands/security-scan.md",
  "skills/security-scan-light.md",
  "docs/**",
]
# 按规则名覆盖启用/禁用，例如：aws_access_key = false
# [security_scan.rule_overrides]
# openai_like_key = false

# 受控 HTTPS 只读拉取（可选）。默认关闭；启用后必须配置 allow_hosts；字面 IP 若为私网/保留地址会被拒绝。
# 环境变量：CAI_FETCH_URL_ENABLED、CAI_FETCH_URL_ALLOW_HOSTS（逗号分隔）、CAI_FETCH_URL_MAX_BYTES、CAI_FETCH_URL_TIMEOUT_SEC
[fetch_url]
enabled = true
# 仅下面这些主机允许出网；支持 `*.example.com` 泛解析。需要更多域请追加到下面的列表，
# 或临时通过 `CAI_FETCH_URL_ALLOW_HOSTS="site-a.com,*.site-b.com"` 覆盖。
allow_hosts = [
  # 代码与 gist
  "github.com",
  "*.github.com",
  "raw.githubusercontent.com",
  "*.githubusercontent.com",
  "gist.github.com",
  # Python 包 / 文档
  "pypi.org",
  "files.pythonhosted.org",
  "docs.python.org",
  # 其它常用开发文档
  "developer.mozilla.org",
  "stackoverflow.com",
  "*.stackexchange.com",
  "readthedocs.io",
  "*.readthedocs.io",
]
# 单次响应体截断上限（字节）与单次请求超时（秒）：默认够用，需要更大的包再放开
# max_bytes = 500000
# timeout_sec = 30

[permissions]
# write_file / run_command / fetch_url: allow | ask | deny
# - allow：工具直接执行
# - ask  ：阻塞并提示；非交互场景可用 `--auto-approve` 或 `CAI_AUTO_APPROVE=1` 放行
# - deny ：彻底禁用
write_file = "allow"
run_command = "allow"
fetch_url = "allow"

[cost]
# cost budget --check 默认上限（可用 CLI --max-tokens 覆盖）
budget_max_tokens = 50000
